<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello Kitty 人格测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC","Microsoft YaHei",sans-serif;
    }
    body {
      background: #fef2f7;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      max-width: 700px;
      width: 100%;
      background: white;
      border-radius: 28px;
      padding: 35px;
      box-shadow: 0 10px 35px rgba(255,165,192,0.18);
      border: 3px solid #ffd6e4;
    }
    .title {
      text-align: center;
      font-size: 28px;
      color: #ff729a;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #999;
      margin-bottom: 35px;
    }
    .question {
      margin-bottom: 22px;
    }
    .q-text {
      font-size: 17px;
      color: #ff5c8d;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .option {
      display: block;
      background: #fff5fa;
      border: 2px solid #ffe0ee;
      border-radius: 12px;
      padding: 12px 16px;
      margin: 6px 0;
      cursor: pointer;
      transition: 0.3s;
      font-size: 15px;
    }
    .option:hover {
      background: #ffe6f2;
      border-color: #ffb6d0;
      transform: translateX(4px);
    }
    .option input {
      margin-right: 8px;
      accent-color: #ff729a;
    }
    .submit-btn {
      width: 100%;
      height: 50px;
      background: linear-gradient(135deg,#ff729a,#ff5c8d);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 17px;
      font-weight: bold;
      margin-top: 25px;
      cursor: pointer;
      transition: 0.3s;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
    }
    .result {
      display: none;
      text-align: center;
      animation: fadeIn 0.6s forwards;
    }
    .result-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ffd6e4;
      margin: 10px auto 20px;
    }
    .result-title {
      font-size: 24px;
      color: #ff5c8d;
      margin-bottom: 15px;
      font-weight: bold;
    }
    .result-eight {
      background: #fff5fa;
      border-left: 4px solid #ff729a;
      padding: 16px 20px;
      border-radius: 12px;
      text-align: left;
      margin-bottom: 20px;
      font-size: 15px;
      color: #333;
      line-height: 1.7;
    }
    .result-desc {
      font-size: 16px;
      color: #444;
      line-height: 2;
      text-align: left;
      margin-bottom: 25px;
    }
    .reset-btn {
      padding: 12px 30px;
      background: #ffc0d0;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    .reset-btn:hover {
      background: #ff9fc0;
      transform: scale(1.05);
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }
    @media (max-width:576px) {
      .card{padding:25px 20px;}
      .title{font-size:24px;}
      .result-img{width:150px;height:150px;}
    }
  </style>
</head>

function getResult() {
  const questions = Array.from({length:15},(_,i)=>`q${i+1}`);
  let answers = {}, complete = true;
  for(let q of questions){
    const sel = document.querySelector(`input[name="${q}"]:checked`);
    if(!sel){ complete=false; break; }
    answers[q]=sel.value;
  }
  if(!complete){ alert("请完成全部15道题目哦～"); return; }

  let score = {A:0,B:0,C:0,D:0,E:0,F:0,G:0};
  for(let q of questions) { const t=answers[q]; score[t]+=scoreMap[q][t]; }
  
  let max=0, rt="A";
  for(let t in score) if(score[t]>max){ max=score[t]; rt=t; }

  const res=personalities[rt];
  document.getElementById("resultImg").src=res.img;
  document.getElementById("resultTitle").innerText=res.name;
  document.getElementById("resultEight").innerText=res.eight;
  document.getElementById("resultDesc").innerText=res.desc;
  document.getElementById("result").style.display="block";
  document.getElementById("testForm").style.display="none";
}

document.querySelector('.submit-btn').onclick=getResult;
